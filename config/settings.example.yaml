# AWS Cost Audit Configuration
# Copy this file to config.yaml and customize for your environment

# AWS Configuration
aws:
  # AWS profile name from ~/.aws/credentials
  # Leave null to use default credentials chain
  profile: null

  # Default region for API calls
  region: us-east-1

  # Role ARN to assume (optional, for cross-account analysis)
  role_arn: null

# Analysis Settings
analysis:
  # Number of days to analyze (default: 30)
  lookback_days: 30

  # Granularity for daily analysis: DAILY, MONTHLY
  granularity: DAILY

  # CPU threshold for right-sizing recommendations (%)
  right_sizing_cpu_threshold: 10

  # Days of low utilization before flagging as idle
  idle_threshold_days: 14

# Budgets Configuration
budgets:
  - name: "Production Monthly"
    limit: 5000.00
    alert_thresholds:
      - 50   # Alert at 50%
      - 80   # Alert at 80%
      - 100  # Alert at 100%

  - name: "Development Monthly"
    limit: 1000.00
    alert_thresholds:
      - 75
      - 90
      - 100

  - name: "Testing Monthly"
    limit: 500.00
    alert_thresholds:
      - 80
      - 100

# Anomaly Detection
anomaly_detection:
  # Number of standard deviations to consider anomaly
  std_dev_threshold: 2.0

  # Minimum baseline days for anomaly detection
  min_baseline_days: 30

  # Severity thresholds (in standard deviations)
  severity:
    medium: 2.0
    high: 3.0

# Output Settings
output:
  # Directory for generated charts
  charts_dir: ./output

  # Directory for generated reports
  reports_dir: ./reports

  # Image format for charts
  image_format: png

  # DPI for chart images
  image_dpi: 150

  # Include timestamps in filenames
  timestamp_files: false

# Report Settings
reports:
  # Report formats to generate
  formats:
    - html
    - json
    - markdown
    - csv

  # Include executive summary
  include_summary: true

  # Include methodology section
  include_methodology: true

  # Top N services to include in detailed breakdown
  top_services_count: 15

# Notification Settings (Optional)
notifications:
  # Enable Slack notifications
  slack:
    enabled: false
    webhook_url: null
    channel: "#aws-costs"

  # Enable email notifications
  email:
    enabled: false
    smtp_host: null
    smtp_port: 587
    from_address: null
    to_addresses: []

# Logging
logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: logs/aws_cost_audit.log
